<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>打字训练营</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;}
:root{
  --bg:#0d0d14;--card:#161622;--accent:#6c63ff;--accent2:#ff4757;
  --green:#2ed573;--yellow:#ffa502;--text:#e0e0ee;--dim:#555570;
  --key-bg:#1e1e30;--key-face:#252540;--key-border:#333350;
  --key-text:#c8c8dd;--shadow:#0a0a14;
}
html,body{height:100%;font-family:'SF Pro','Segoe UI','Helvetica Neue',sans-serif;background:var(--bg);color:var(--text);}
body{display:flex;flex-direction:column;overflow:hidden;height:100dvh;}

/* ── Header ── */
.header{padding:8px 14px;background:var(--card);border-bottom:1px solid #222;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:10;}
.header h1{font-size:16px;background:linear-gradient(135deg,var(--accent),#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:800;}
.tabs{display:flex;gap:3px;}
.tab{padding:5px 12px;border-radius:18px;border:1.5px solid #333;background:transparent;color:var(--dim);font-size:12px;cursor:pointer;transition:.2s;font-weight:600;}
.tab.on{background:var(--accent);border-color:var(--accent);color:#fff;}

/* ── Content ── */
.content{flex:1;display:flex;flex-direction:column;align-items:center;padding:6px 10px;gap:6px;overflow-y:auto;min-height:0;}

/* ── Level Select ── */
#levelScreen{width:100%;max-width:700px;}
#levelScreen h2{text-align:center;font-size:14px;color:var(--dim);margin-bottom:8px;font-weight:500;}
.lv-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:6px;}
.lv-card{background:var(--card);border:1.5px solid var(--key-border);border-radius:12px;padding:14px 6px;text-align:center;cursor:pointer;transition:.2s;}
.lv-card:hover{border-color:var(--accent);transform:translateY(-2px);}
.lv-card .icon{font-size:26px;}
.lv-card .name{font-size:11px;color:var(--dim);margin-top:5px;}

/* ── Stats ── */
.stats{display:flex;gap:5px;width:100%;max-width:700px;}
.st{background:var(--card);border:1px solid #222;border-radius:10px;padding:5px 8px;flex:1;text-align:center;}
.st .v{font-size:18px;font-weight:700;color:var(--accent);}
.st .l{font-size:9px;color:var(--dim);margin-top:1px;}

/* ── Text Area ── */
.textBox{background:var(--card);border:1px solid #222;border-radius:12px;padding:12px 14px;width:100%;max-width:700px;font-size:22px;line-height:2;letter-spacing:1.5px;min-height:70px;word-break:break-all;}
.ch{display:inline;border-radius:3px;padding:1px 1px;transition:color .08s;}
.ch.ok{color:var(--green);}
.ch.bad{color:var(--accent2);background:rgba(255,71,87,.12);}
.ch.cur{background:var(--accent);color:#fff;border-radius:3px;}
.ch.wt{color:var(--dim);}
/* Pinyin display */
.py-char{font-size:28px;display:block;text-align:center;margin:4px 0;color:var(--yellow);font-weight:700;}
.py-pinyin{font-size:16px;color:var(--dim);text-align:center;margin-bottom:6px;}
.py-input{display:flex;justify-content:center;gap:3px;flex-wrap:wrap;}
.py-letter{width:28px;height:36px;border:2px solid var(--key-border);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;background:var(--key-face);transition:.15s;}
.py-letter.filled{border-color:var(--accent);color:var(--accent);}
.py-letter.current{border-color:var(--accent);animation:pyPulse 1s infinite;}
.py-letter.correct{border-color:var(--green);color:var(--green);background:rgba(46,213,115,.1);}
.py-letter.wrong{border-color:var(--accent2);color:var(--accent2);background:rgba(255,71,87,.1);}
@keyframes pyPulse{0%,100%{opacity:1}50%{opacity:.5}}

/* ── Buttons ── */
.btns{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;}
.btn{padding:8px 18px;border-radius:10px;border:none;font-size:12px;font-weight:700;cursor:pointer;transition:.15s;}
.btn-p{background:var(--accent);color:#fff;}
.btn-h{background:var(--yellow);color:#1a1a2e;}
.btn-r{background:var(--accent2);color:#fff;}

/* ── Help Panel ── */
.help{background:var(--card);border:1.5px solid var(--accent);border-radius:12px;padding:14px;width:100%;max-width:700px;display:none;animation:sl .25s;}
.help.show{display:block;}
@keyframes sl{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:none}}
.help h3{color:var(--accent);margin-bottom:6px;font-size:13px;}
.help .hint{font-size:13px;line-height:1.9;color:var(--text);}
.help .hint b{color:var(--yellow);}

/* ── Overlay ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:100;display:none;align-items:center;justify-content:center;padding:16px;}
.overlay.show{display:flex;}
.o-card{background:var(--card);border-radius:16px;padding:24px;max-width:440px;width:100%;text-align:center;border:1px solid #333;}
.o-card h2{color:var(--accent);margin-bottom:8px;}
.o-card p{color:var(--dim);line-height:1.7;margin-bottom:8px;font-size:13px;}
.o-card .big{font-size:40px;font-weight:700;color:var(--accent);margin:6px 0;letter-spacing:6px;}
.o-card .fl{font-size:14px;color:var(--yellow);margin:4px 0;}
.done{text-align:center;padding:16px;}
.done .emoji{font-size:48px;}
.done h2{color:var(--green);margin:6px 0;}
.done p{color:var(--dim);font-size:12px;line-height:1.7;}

/* ── Heatmap ── */
.heatmap{background:var(--card);border:1px solid #222;border-radius:12px;padding:12px;width:100%;max-width:700px;}
.heatmap h3{color:var(--accent);font-size:13px;margin-bottom:8px;text-align:center;}
.hm-grid{display:flex;flex-wrap:wrap;gap:3px;justify-content:center;}
.hm-key{width:36px;height:36px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:#fff;position:relative;}
.hm-key .hm-rate{font-size:8px;position:absolute;bottom:1px;opacity:.7;}

/* ── Progress Chart ── */
.chart-wrap{background:var(--card);border:1px solid #222;border-radius:12px;padding:12px;width:100%;max-width:700px;}
.chart-wrap h3{color:var(--accent);font-size:13px;margin-bottom:8px;text-align:center;}
canvas{width:100%;height:120px;border-radius:8px;}

/* ══════════════════════════════════════
   KEYBOARD
   ══════════════════════════════════════ */
.kb-wrap{flex-shrink:0;background:#111120;padding:6px 4px 8px;border-top:1px solid #222;}
.kb{max-width:740px;margin:0 auto;}
.kb-row{display:flex;gap:3px;margin-bottom:3px;justify-content:center;}
.k{background:var(--key-face);border:1px solid var(--key-border);border-bottom:3px solid #1a1a2e;border-radius:5px;color:var(--key-text);font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .06s;height:40px;position:relative;}
.k:active,.k.hit{background:var(--accent);color:#fff;border-bottom:1px solid var(--accent);transform:translateY(2px);}
.k.ok-k{background:rgba(46,213,115,.15);border-color:var(--green);color:var(--green);}
.k.bad-k{background:rgba(255,71,87,.15);border-color:var(--accent2);color:var(--accent2);}
.k.hint-k{animation:glow .8s infinite alternate;box-shadow:0 0 12px rgba(108,99,255,.6);}
@keyframes glow{from{box-shadow:0 0 6px rgba(108,99,255,.3)}to{box-shadow:0 0 18px rgba(108,99,255,.9)}}
.k .sub{font-size:8px;color:var(--dim);position:absolute;top:2px;left:4px;font-weight:400;}
.k-1u{width:44px;}.k-1_5{width:66px;}.k-1_75{width:77px;}
.k-2u{width:92px;}.k-2_25{width:99px;}.k-2_75{width:121px;}.k-space{width:264px;}

/* ── Finger Guide above keyboard ── */
.finger-bar{display:flex;justify-content:center;gap:2px;padding:0 4px 4px;max-width:740px;margin:0 auto;}
.fg{width:12px;height:12px;border-radius:50%;border:1px solid rgba(255,255,255,.15);}

/* ── Responsive ── */
@media(max-width:750px){
  .k{height:38px;font-size:11px;}
  .k-1u{width:calc((100vw - 20px)/15);}
  .k-1_5{width:calc((100vw - 20px)/15*1.5);}
  .k-1_75{width:calc((100vw - 20px)/15*1.75);}
  .k-2u{width:calc((100vw - 20px)/15*2);}
  .k-2_25{width:calc((100vw - 20px)/15*2.25);}
  .k-2_75{width:calc((100vw - 20px)/15*2.75);}
  .k-space{width:calc((100vw - 20px)/15*6);}
  .kb{max-width:100vw;}
  .textBox{font-size:18px;padding:10px 10px;}
}
@media(max-width:400px){
  .k{height:34px;font-size:10px;}
  .stats{gap:3px;}.st{padding:3px 4px;}.st .v{font-size:15px;}
}

/* ── Landscape ── */
@media(orientation:landscape) and (max-height:500px){
  body{flex-direction:row;}
  .header{writing-mode:vertical-rl;padding:6px 4px;border-bottom:none;border-right:1px solid #222;width:auto;}
  .header h1{font-size:13px;}
  .tabs{flex-direction:column;gap:4px;margin-top:8px;}
  .tab{padding:4px 6px;font-size:10px;}
  .content{flex:1;padding:4px 6px;gap:4px;overflow-y:auto;}
  .textBox{font-size:16px;padding:8px;min-height:50px;}
  .kb-wrap{padding:4px;width:60%;max-width:none;}
  .k{height:34px;font-size:10px;}
  .k-1u{width:36px;}.k-1_5{width:54px;}.k-1_75{width:63px;}
  .k-2u{width:72px;}.k-2_25{width:81px;}.k-2_75{width:99px;}.k-space{width:210px;}
  .stats{gap:3px;}
  .st{padding:3px 4px;}.st .v{font-size:14px;}
  .st .l{font-size:8px;}
  .py-char{font-size:22px;}
  .py-letter{width:24px;height:30px;font-size:15px;}
  .help,.heatmap,.chart-wrap{display:none !important;}
}
</style>
</head>
<body>

<div class="header">

<div class="content" id="content">

</div>

<!-- Finger guide -->
<div class="finger-bar" id="fingerBar"></div>

<!-- Keyboard -->
<div class="kb-wrap">

  </div>
</div>

<script>
// ═══════════════════════════════════════════
// SOUND (Web Audio API)
// ═══════════════════════════════════════════
let audioCtx = null;
function getAudio(){ if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)(); return audioCtx; }

function playCorrect(){
  try{
    const c=getAudio(), o=c.createOscillator(), g=c.createGain();
    o.connect(g); g.connect(c.destination);
    o.frequency.value=880; o.type='sine';
    g.gain.setValueAtTime(0.08,c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.12);
    o.start(c.currentTime); o.stop(c.currentTime+0.12);
  }catch(e){}
}
function playWrong(){
  try{
    const c=getAudio(), o=c.createOscillator(), g=c.createGain();
    o.connect(g); g.connect(c.destination);
    o.frequency.value=220; o.type='square';
    g.gain.setValueAtTime(0.06,c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.2);
    o.start(c.currentTime); o.stop(c.currentTime+0.2);
  }catch(e){}
}
function playDone(){
  try{
    const c=getAudio();
    [523,659,784].forEach((f,i)=>{
      const o=c.createOscillator(),g=c.createGain();
      o.connect(g);g.connect(c.destination);
      o.frequency.value=f;o.type='sine';
      const t=c.currentTime+i*0.12;
      g.gain.setValueAtTime(0.08,t);
      g.gain.exponentialRampToValueAtTime(0.001,t+0.2);
      o.start(t);o.stop(t+0.2);
    });
  }catch(e){}
}

function vibrate(ms){ try{ if(navigator.vibrate) navigator.vibrate(ms); }catch(e){} }

// ═══════════════════════════════════════════
// ERROR TRACKING & HISTORY
// ═══════════════════════════════════════════
let keyErrors = {}; // {key: {total, wrong}}
let history = [];   // [{date, wpm, acc, score}]
try {
  keyErrors = JSON.parse(localStorage.getItem('tp-err')||'{}');
  history = JSON.parse(localStorage.getItem('tp-hist')||'[]');
} catch(e){}

function recordError(key){
  const k = key.toLowerCase();
  if(!keyErrors[k]) keyErrors[k]={total:0,wrong:0};
  keyErrors[k].total++;
  keyErrors[k].wrong++;
  localStorage.setItem('tp-err',JSON.stringify(keyErrors));
}
function recordCorrect(key){
  const k = key.toLowerCase();
  if(!keyErrors[k]) keyErrors[k]={total:0,wrong:0};
  keyErrors[k].total++;
  localStorage.setItem('tp-err',JSON.stringify(keyErrors));
}
function saveHistory(wpm,acc,score){
  const today = new Date().toLocaleDateString('zh-CN');
  history.push({date:today,wpm,acc,score,ts:Date.now()});
  if(history.length>200) history=history.slice(-200);
  localStorage.setItem('tp-hist',JSON.stringify(history));
}

function buildKB(){
  const el=document.getElementById('kb'); el.innerHTML='';
  KB_ROWS.forEach(row=>{
    const rd=document.createElement('div'); rd.className='kb-row';
    row.forEach(item=>{
      if(typeof item==='string') item=[item,'"','1u'];
      const[main,sub,w]=item;
      const k=document.createElement('div');
      k.className='k k-'+(w==='space'?'space':w.replace('.','_'));
      k.dataset.k=main.toLowerCase();
      if(main===' ') k.innerHTML='';
      else if(sub&&main!=='Backspace'&&main!=='Tab'&&main!=='CapsLock'&&main!=='Enter'&&main!=='Shift'&&main!=='Ctrl'&&main!=='Alt')
        k.innerHTML=`<span class="sub">${sub}</span>${main.toUpperCase()}`;
      else k.textContent=main;
      k.addEventListener('pointerdown',e=>{e.preventDefault();pressKey(main);});
      rd.appendChild(k);
    });
    el.appendChild(rd);
  });
  // Finger bar
  buildFingerBar();
}

function buildFingerBar(){
  const bar=document.getElementById('fingerBar'); bar.innerHTML='';
  const order=['左小指','左无名指','左中指','左食指','左食指','右食指','右食指','右中指','右无名指','右小指'];
  order.forEach(f=>{
    const d=document.createElement('div'); d.className='fg'; d.style.background=FC[f]||'#555'; d.title=f;
    bar.appendChild(d);
  });
}

function hlKey(k,cls){
  document.querySelectorAll('.k').forEach(el=>{el.classList.remove('hit','ok-k','bad-k','hint-k');if(el.dataset.k===k)el.classList.add(cls);});
}

function pick(arr,n){const s=[];for(let i=0;i<n;i++)s.push(arr[Math.floor(Math.random()*arr.length)]);return s;}
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

  if(!taught[id]){taught[id]=1;localStorage.setItem('tp-t',JSON.stringify(taught));showTeachOv(l.name,l.desc,l.text,l.fingers);}
}

function beginRound(){

  document.getElementById('levelScreen').style.display='none';
  document.getElementById('statsBar').style.display='flex';

function renderText(){
  const box=document.getElementById('textBox'); box.innerHTML='';
  for(let i=0;i<text.length;i++){
    const s=document.createElement('span');
    s.className='ch '+(i<idx?(i===idx-1&&bad>0?'bad':'ok'):(i===idx?'cur':'wt'));
    s.textContent=text[i];
    s.id='c'+i;
    box.appendChild(s);
  }
  if(lvl&&lvl.mode==='teach'&&idx<text.length){clearHL();hlKey(text[idx].toLowerCase(),'hit');}
  else clearHL();
  const cur=document.getElementById('c'+idx);
  if(cur)cur.scrollIntoView({behavior:'smooth',block:'nearest'});
}

// ═══════════════════════════════════════════
// KEY PRESS
// ═══════════════════════════════════════════
function pressKey(k){
  if(mode==='pinyin'){return pressPinyin(k);}
  if(!lvl||idx>=text.length)return;
  if(!t0)t0=Date.now();
  const exp=text[idx];
  const match=(k===exp)||(k.toLowerCase()===exp.toLowerCase());
  if(match){
    ok++;combo++;if(combo>maxC)maxC=combo;score+=10+Math.floor(combo/5)*5;
    recordCorrect(exp);
    playCorrect();vibrate(20);
    if(lvl.mode==='teach')hlKey(exp.toLowerCase(),'ok-k');
    idx++;
    if(idx>=text.length)roundDone(); else renderText();
  } else {
    bad++;combo=0;
    recordError(exp);
    playWrong();vibrate(60);
    if(lvl.mode==='teach')hlKey(exp.toLowerCase(),'bad-k');
    const el=document.getElementById('c'+idx);
    if(el){el.classList.add('bad');setTimeout(()=>{if(idx<text.length)renderText();},250);}
  }
  updateStats();
}

document.addEventListener('keydown',e=>{
  if(document.getElementById('teachOv').classList.contains('show'))return;
  if(e.key==='Tab'){e.preventDefault();return;}
  if(e.key==='Backspace'){e.preventDefault();if(idx>0){idx--;renderText();updateStats();}return;}
  if(e.key.length===1){e.preventDefault();pressKey(e.key);}
});
document.addEventListener('keyup',()=>clearHL());

function updateStats(){
  const m=t0?(Date.now()-t0)/1000/60:0;
  document.getElementById('sv').textContent=m>0?Math.round(idx/5/m):0;
  document.getElementById('av').textContent=idx>0?Math.round(ok/(ok+bad)*100)+'%':'100%';
  document.getElementById('cv').textContent=combo;
  document.getElementById('scv').textContent=score;
}

function roundDone(){
  if(lvl.id>=0)completed[lvl.id]=1;
  localStorage.setItem('tp-c',JSON.stringify(completed));
  const sec=t0?(Date.now()-t0)/1000:0;
  const wpm=Math.round(ok/5/(sec/60));
  const acc=Math.round(ok/(ok+bad)*100);
  saveHistory(wpm,acc,score);
  playDone();vibrate(100);
  document.getElementById('textBox').innerHTML=`
    <div class="done"><div class="emoji">🎉</div><h2>完成！</h2>
    <p>速度: <b style="color:var(--accent)">${wpm}</b> 字/分钟<br>
    正确率: <b style="color:var(--green)">${acc}%</b><br>
    得分: <b style="color:var(--yellow)">${score}</b> | 最大连击: ${maxC}<br>
    用时: ${Math.round(sec)}秒</p></div>`;
  clearHL();
}

function startPinyin(id){
  lvl={id,mode:'pinyin'};
  pyList=PY_GEN[id](); pyIdx=0; pyCorrect=0; pyWrong=0; t0=null; helpOpen=false;
  document.getElementById('levelScreen').style.display='none';
  document.getElementById('statsBar').style.display='flex';

  document.getElementById('btns').style.display='flex';
  document.getElementById('helpPanel').classList.remove('show');
  document.getElementById('statsScreen').style.display='none';
  renderPinyin(); updatePyStats();
}

function renderPinyin(){
  if(pyIdx>=pyList.length){pyDone();return;}
  const item=pyList[pyIdx];
  pyChar=item.ch; pyTarget=item.py.replace(/\s/g,''); // remove spaces for matching
  pyTyped='';
  const box=document.getElementById('textBox');
  let h=`<div class="py-char">${item.ch}</div>`;
  h+=`<div class="py-pinyin">第 ${pyIdx+1}/${pyList.length} 题</div>`;
  h+=`<div class="py-input">`;
  for(let i=0;i<pyTarget.length;i++){
    h+=`<div class="py-letter${i===0?' current':''}" id="pl${i}"></div>`;
  }
  h+=`</div>`;
  box.innerHTML=h;
  clearHL();
  // Highlight first key of pinyin
  const firstKey=pyTarget[0];
  if(firstKey) hlKey(firstKey,'hit');
}

function pressPinyin(k){
  if(pyIdx>=pyList.length)return;
  if(!t0)t0=Date.now();
  const expected=pyTarget[pyTyped.length];
  if(!expected)return;

  if(k.toLowerCase()===expected.toLowerCase()){
    pyTyped+=expected;
    pyCorrect++;
    recordCorrect(expected);
    playCorrect();vibrate(20);
    // Update UI
    for(let i=0;i<pyTarget.length;i++){
      const el=document.getElementById('pl'+i);
      if(!el)continue;
      el.className='py-letter';
      if(i<pyTyped.length) el.classList.add('correct');
      else if(i===pyTyped.length) el.classList.add('current');
    }
    clearHL();
    if(pyTyped.length>=pyTarget.length){
      // Done this char
      setTimeout(()=>{pyIdx++;renderPinyin();},300);
    } else {
      const next=pyTarget[pyTyped.length];
      if(next) hlKey(next,'hit');
    }
  } else {
    pyWrong++;
    recordError(expected);
    playWrong();vibrate(60);
    const el=document.getElementById('pl'+pyTyped.length);
    if(el){el.classList.add('wrong');setTimeout(()=>el.classList.remove('wrong'),300);}
  }
  updatePyStats();
}

function updatePyStats(){
  const total=pyCorrect+pyWrong;
  const m=t0?(Date.now()-t0)/1000/60:0;
  document.getElementById('sv').textContent=m>0?Math.round(pyCorrect/m):0;
  document.getElementById('av').textContent=total>0?Math.round(pyCorrect/total*100)+'%':'100%';
  document.getElementById('cv').textContent=pyIdx;
  document.getElementById('scv').textContent=pyCorrect*10;
}

function pyDone(){
  completed[lvl.id]=1;
  localStorage.setItem('tp-c',JSON.stringify(completed));
  const sec=t0?(Date.now()-t0)/1000:0;
  const total=pyCorrect+pyWrong;
  const acc=total>0?Math.round(pyCorrect/total*100):100;
  const wpm=Math.round(pyCorrect/(sec/60));
  saveHistory(wpm,acc,pyCorrect*10);
  playDone();vibrate(100);
  document.getElementById('textBox').innerHTML=`
    <div class="done"><div class="emoji">🎉</div><h2>拼音练习完成！</h2>
    <p>速度: <b style="color:var(--accent)">${wpm}</b> 字/分钟<br>
    正确率: <b style="color:var(--green)">${acc}%</b><br>
    得分: <b style="color:var(--yellow)">${pyCorrect*10}</b><br>
    用时: ${Math.round(sec)}秒</p></div>`;
}

// ═══════════════════════════════════════════
// STATS SCREEN
// ═══════════════════════════════════════════
function drawChart(){
  const canvas=document.getElementById('chartCanvas');
  const ctx=canvas.getContext('2d');
  canvas.width=canvas.offsetWidth*2; canvas.height=240;
  ctx.scale(2,2);
  const w=canvas.offsetWidth, h=120;
  ctx.clearRect(0,0,w,h);

  // Use last 20 entries
  const data=history.slice(-20);
  if(data.length<2){
    ctx.fillStyle='#555570'; ctx.font='13px sans-serif'; ctx.textAlign='center';
    ctx.fillText('数据不足，多练习几次就能看到进步曲线！',w/2,h/2);
    return;
  }

  const maxWpm=Math.max(...data.map(d=>d.wpm),10);
  const pad={t:10,b:20,l:30,r:10};
  const cw=w-pad.l-pad.r, ch=h-pad.t-pad.b;

  // Grid
  ctx.strokeStyle='#222'; ctx.lineWidth=0.5;
  for(let i=0;i<=4;i++){
    const y=pad.t+ch*(1-i/4);
    ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(w-pad.r,y);ctx.stroke();
    ctx.fillStyle='#555570';ctx.font='9px sans-serif';ctx.textAlign='right';
    ctx.fillText(Math.round(maxWpm*i/4),pad.l-4,y+3);
  }

  // WPM line
  ctx.strokeStyle='#6c63ff'; ctx.lineWidth=2; ctx.lineJoin='round'; ctx.beginPath();
  data.forEach((d,i)=>{
    const x=pad.l+cw*i/(data.length-1);
    const y=pad.t+ch*(1-d.wpm/maxWpm);
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  });
  ctx.stroke();

  // Dots
  data.forEach((d,i)=>{
    const x=pad.l+cw*i/(data.length-1);
    const y=pad.t+ch*(1-d.wpm/maxWpm);
    ctx.fillStyle='#6c63ff';ctx.beginPath();ctx.arc(x,y,3,0,Math.PI*2);ctx.fill();
  });

  // Label
  ctx.fillStyle='#555570';ctx.font='9px sans-serif';ctx.textAlign='center';
  ctx.fillText('← 速度(字/分钟) →',w/2,h-2);
}

function drawHeatmap(){
  const grid=document.getElementById('hmGrid'); grid.innerHTML='';
  const keys='qwertyuiopasdfghjklzxcvbnm'.split('');
  keys.forEach(k=>{
    const d=document.createElement('div'); d.className='hm-key';
    const e=keyErrors[k];
    const rate=e&&e.total>0?e.wrong/e.total:0;
    const pct=Math.round(rate*100);
    // Color: green (0%) -> yellow (20%) -> red (50%+)
    const r=Math.min(255,Math.round(rate*510));
    const g=Math.min(255,Math.round((1-rate)*400));
    d.style.background=`rgba(${r},${g},60,0.7)`;
    d.innerHTML=`${k.toUpperCase()}<span class="hm-rate">${e?e.total:0}</span>`;
    d.title=`${k}: 错误率${pct}% (${e?e.wrong:0}/${e?e.total:0})`;
    grid.appendChild(d);
  });
}

function showTeachOv(title,desc,txt,fingers){
  document.getElementById('teachTitle').textContent='📖 '+title;
  document.getElementById('teachDesc').textContent=desc;
  const chars=[...new Set(txt.replace(/ /g,''))].slice(0,10);
  document.getElementById('teachChars').textContent=chars.join(' ');
  let fi='';
  if(fingers&&Object.keys(fingers).length>0){
    fi=Object.entries(fingers).map(([k,v])=>`<span style="color:${FC[v]||'#888'};font-weight:700">${k}→${v}</span>`).join('　');
  } else fi='运用已学的所有键位';
  document.getElementById('teachFinger').innerHTML=fi;
  document.getElementById('teachOv').classList.add('show');
}
function closeTeach(){document.getElementById('teachOv').classList.remove('show');}

function resetLv(){
  if(!lvl)return;
  if(lvl.mode==='teach')startTeach(lvl.id);
  else if(lvl.mode==='challenge')startChallenge(lvl.id);
  else if(lvl.mode==='pinyin')startPinyin(lvl.id);
}

function switchTab(m,el){
  mode=m;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  el.classList.add('on');
  lvl=null;
  showLevels();
}
